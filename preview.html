<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExpoBIZ v1.7.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#f5f5f7;margin:0;padding:0;min-height:100vh}
.phone{width:100%;max-width:480px;height:100vh;overflow:hidden;background:#f5f5f7;position:relative;margin:0 auto}
@media(min-width:481px){body{background:#e8e6e3}.phone{box-shadow:0 0 40px rgba(0,0,0,.08)}}
.scroll{overflow-y:auto;height:100%;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.bdg{display:inline-block;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700}
.am-wrap{position:relative;height:330px;overflow:hidden;margin:0 20px;cursor:grab}
.car-arrow{position:absolute;top:50%;width:36px;height:36px;border-radius:18px;background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);border:1px solid rgba(0,0,0,0.06);box-shadow:0 2px 12px rgba(0,0,0,0.10);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;font-size:15px;color:#374151;transition:all .2s;transform:translateY(-50%)}
.car-arrow:hover{background:rgba(255,255,255,1);box-shadow:0 4px 16px rgba(0,0,0,0.15);transform:translateY(-50%) scale(1.08)}
.car-arrow:active{transform:translateY(-50%) scale(0.95)}
.car-arrow-l{left:-2px}.car-arrow-r{right:-2px}
.detail-nav-btn{background:rgba(255,255,255,.18);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:12px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
.detail-nav-btn:hover{background:rgba(255,255,255,.35);transform:scale(1.08)}
.detail-nav-btn:active{transform:scale(0.95)}
.am-wrap:active{cursor:grabbing}
.am-card{position:absolute;width:100%;left:0;top:0;border-radius:20px;overflow:hidden;will-change:transform,opacity,filter;transform-origin:center center}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:#6b7280;font-size:14px;font-weight:600;gap:12px}
.loading .spinner{width:32px;height:32px;border:3px solid rgba(99,102,241,.2);border-top:3px solid #6366f1;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#detail-overlay{scrollbar-width:none;-ms-overflow-style:none}
#detail-overlay::-webkit-scrollbar{display:none}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(-40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}
</style>
</head>

      <div onclick="closeAuth();switchTab('home')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer">

        <span style="font-size:10px;font-weight:700;color:#c0c0c8">홈</span>

<script>
const SHEET_API = "https://script.google.com/macros/s/AKfycbz4CkYNHCCvBa0saV2XE6mZTZZ2CdMSZ8rXhzN1mvSynEr7KiZtg2e3-eqKvTwjpLJk/exec";
const THEME = {"반려동물":"#E8A87C","식음료":"#A0522D","건축":"#5B7DB1","육아":"#D4A0A0","농수산":"#7CB342","캠핑·아웃도어":"#4E7C46","스포츠·레저":"#3A6EA5","가구·인테리어":"#A67C52","산업·제조":"#607D8B","물류":"#4A7FB5","과학":"#7E57C2","환경·에너지":"#43A047","의료·바이오":"#C62828","IT·전자":"#1565C0","뷰티·화장품":"#E91E63","교육":"#FF8F00","금융":"#37474F","문화·엔터":"#8E24AA","자동차":"#424242","창업":"#FF6347"};
const today = new Date(); today.setHours(0,0,0,0);
const cStates = {};
let currentTab = 'home';
let _allData = [];
let _detailList = [];
window._rememberMe = true;
let _detailIndex = 0;
let _favorites = []; // 즐겨찾기 ID 목록

/* ─── 알림 시스템 ─── */
function showNotifications(){
  const panel=document.getElementById('noti-panel');
  const list=document.getElementById('noti-list');
  panel.style.display='block';
  // 알림 배지 숨기기
  const badge=document.getElementById('noti-badge');
  if(badge)badge.style.display='none';
  // 가까운 전시회 알림 생성
  const upcoming=_allData.filter(e=>!e.isPlaceholder).filter(e=>{
    const s=new Date(e.dateStart);s.setHours(0,0,0,0);
    const d=Math.round((s-today)/864e5);
    return d>=0&&d<=14;
  }).sort((a,b)=>new Date(a.dateStart)-new Date(b.dateStart)).slice(0,8);
  if(upcoming.length===0){
    list.innerHTML='<div style="text-align:center;padding:40px;color:#9ca3af;font-size:13px">새로운 알림이 없습니다</div>';
    return;
  }
  list.innerHTML=upcoming.map(ex=>{
    const s=new Date(ex.dateStart);s.setHours(0,0,0,0);
    const d=Math.round((s-today)/864e5);
    const ra=getRegAvail(ex);
    const msg=d===0?'오늘 진행 중!':d<=3?d+'일 후 시작':'곧 시작 (D-'+d+')';
    const isUrgent=d<=3;
    return `<div onclick="closeNoti();showDetail(_allData.find(e=>e.id===${ex.id}))" style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;cursor:pointer;${isUrgent?'background:rgba(239,68,68,.06)':'background:rgba(0,0,0,.02)'};margin-bottom:6px;border:1px solid ${isUrgent?'rgba(239,68,68,.1)':'rgba(0,0,0,.04)'}">
      <div style="font-size:28px;flex-shrink:0">${ex.image}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:800;color:#1e1e2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ex.name}</div>
        <div style="font-size:11px;color:#6b7280;margin-top:2px">${ex.venue} · ${ex.date}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:11px;font-weight:800;color:${isUrgent?'#ef4444':'#6366f1'}">${msg}</div>
        <div style="font-size:10px;color:#9ca3af;margin-top:2px">${ra.icon} ${ra.label}</div>
      </div>

/* ─── 즐겨찾기 관리 ─── */
function toggleFav(id, e){
  if(e){ e.stopPropagation(); e.preventDefault(); }
  const idx = _favorites.indexOf(id);
  if(idx > -1){ _favorites.splice(idx, 1); }
  else { _favorites.push(id); }
  // 세션 저장
  try{sessionStorage.setItem('expobiz_fav',JSON.stringify(_favorites));}catch(e){}
  // 카드 하트 업데이트
  document.querySelectorAll('.fav-btn-'+id).forEach(el=>{
    el.innerHTML = _favorites.includes(id) ? '❤️' : '🤍';
  });
  // MY 페이지 관심 전시회 수 업데이트
  updateFavCount();
  // 플래너 업데이트
  updatePlanner();
}
function isFav(id){ return _favorites.includes(id); }
function updateFavCount(){
  const el = document.querySelector('#page-my .fav-count');
  if(el) el.textContent = _favorites.length + '개';
}
function updatePlanner(){
  const list = document.getElementById('plan-list');
  const empty = document.getElementById('plan-empty');
  if(!list) return;
  const favExs = _allData.filter(ex => _favorites.includes(ex.id));
  if(favExs.length === 0){
    list.innerHTML = '';
    if(empty) empty.style.display = 'block';
    return;
  }
  if(empty) empty.style.display = 'none';
  list.innerHTML = favExs.map(ex => {
    const tc = THEME[ex.category]||ex.color||'#607D8B';
    const ra = getRegAvail(ex);
    return `<div onclick='showDetail(_allData.find(e=>e.id===${ex.id}))' style="background:#fff;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid rgba(0,0,0,.04)">
      <div style="width:44px;height:44px;border-radius:12px;background:${tc};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${ex.image}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:800;color:#1e1e2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ex.name}</div>
        <div style="font-size:11px;color:#6b7280;margin-top:2px">${ex.venue} · ${ex.date}</div>
      </div>
      <span onclick="event.stopPropagation();toggleFav(${ex.id},event)" style="font-size:18px;cursor:pointer">❤️</span>
    </div>`;
  }).join('');
}

/* ─── 공유 기능 ─── */
function shareExpo(ex){
  const url = ex.regUrl || ('https://www.google.com/search?q='+encodeURIComponent(ex.name));
  const text = ex.name + ' - ' + ex.venue + ' ' + ex.date;
  if(navigator.share){
    navigator.share({title:ex.name, text:text, url:url}).catch(()=>{});
  } else {
    copyToClip(url);
    showToast('공유 링크가 복사되었습니다');
  }
}
function copyLink(ex){
  const url = ex.regUrl || ('https://www.google.com/search?q='+encodeURIComponent(ex.name));
  copyToClip(url);
  showToast('링크가 복사되었습니다');
}
function shareKakao(ex){
  const url = ex.regUrl || ('https://www.google.com/search?q='+encodeURIComponent(ex.name));
  const kakaoUrl = 'https://sharer.kakao.com/talk/friends/picker/link?app_key=javascript_key&url='+encodeURIComponent(url);
  // 카카오톡 앱이 설치된 모바일이면 앱 스킴, 아니면 웹 공유
  const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
  if(isMobile){
    const shareText = encodeURIComponent(ex.name + '\n' + ex.venue + ' ' + ex.date + '\n' + url);
    window.open('kakaotalk://msg/text/'+shareText, '_blank');
    setTimeout(()=>{ window.open('https://accounts.kakao.com/weblogin/account', '_blank'); }, 1500);
  } else {
    copyToClip(ex.name + '\n' + ex.venue + ' ' + ex.date + '\n' + url);
    showToast('카카오톡 공유 내용이 복사되었습니다');
  }
}
function copyToClip(text){
  if(navigator.clipboard){ navigator.clipboard.writeText(text).catch(()=>{}); }
  else {
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  }
}
function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;animation:fadeInOut 2s forwards;pointer-events:none;font-family:"Noto Sans KR",sans-serif';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

function doLogin(){
  const email=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-pw').value;
  const err=document.getElementById('auth-err');
  if(!email){err.textContent='이메일을 입력해주세요';return;}
  if(!pw){err.textContent='비밀번호를 입력해주세요';return;}
  // 간이 인증 (데모용: 이메일 형식 체크)
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='올바른 이메일 형식이 아닙니다';return;}
  if(pw.length<4){err.textContent='비밀번호가 올바르지 않습니다';return;}
  _user={name:email.split('@')[0], email:email, phone:''};
  try{
    if(window._rememberMe){
      localStorage.setItem('expobiz_user',JSON.stringify(_user));

function doSignup(){
  const name=document.getElementById('auth-name').value.trim();
  const email=document.getElementById('auth-email').value.trim();
  const phone=document.getElementById('auth-phone').value.trim();
  const pw=document.getElementById('auth-pw').value;
  const err=document.getElementById('auth-err');
  if(!name){err.textContent='이름을 입력해주세요';return;}
  if(!email){err.textContent='이메일을 입력해주세요';return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='올바른 이메일 형식이 아닙니다';return;}
  if(!phone){err.textContent='전화번호를 입력해주세요';return;}
  if(pw.length<6){err.textContent='비밀번호는 6자리 이상이어야 합니다';return;}
  _user={name:name, email:email, phone:phone};
  try{sessionStorage.setItem('expobiz_user',JSON.stringify(_user));}catch(e){}
  closeAuth();
  renderMyPage();
  showToast('회원가입 완료! 환영합니다 🎉');
}

function formatPhone(el){
  let v=el.value.replace(/[^0-9]/g,'');
  if(v.length>11)v=v.slice(0,11);
  if(v.length>7)v=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
  else if(v.length>3)v=v.slice(0,3)+'-'+v.slice(3);
  el.value=v;
}

function doLogout(){
  _user=null;
  try{sessionStorage.removeItem('expobiz_user');}catch(e){}
  renderMyPage();
  showToast('로그아웃 되었습니다');
}

function switchTab(tab){
  currentTab = tab;
  // 모든 페이지 숨기기
  ['search','qr','plan','my'].forEach(p => {
    const el = document.getElementById('page-'+p);
    if(el) el.style.display = 'none';
  });
  // 홈이 아니면 해당 페이지 표시
  if(tab !== 'home'){
    const pg = document.getElementById('page-'+tab);
    if(pg) pg.style.display = 'block';
  }
  // 상세 오버레이 닫기
  document.getElementById('detail-overlay').style.display = 'none';
  // 네비 아이콘 업데이트
  const navItems = {
    home: {fill:true, stroke:'#6366f1', color:'#6366f1', weight:'700'},
    search: {fill:false, stroke:'#6366f1', color:'#6366f1', weight:'700'},
    qr: {},
    plan: {fill:false, stroke:'#6366f1', color:'#6366f1', weight:'700'},
    my: {fill:false, stroke:'#6366f1', color:'#6366f1', weight:'700'},
  };
  ['home','search','plan','my'].forEach(k => {
    const nav = document.getElementById('nav-'+k);
    if(!nav) return;
    const isOn = (k === tab);
    nav.style.opacity = isOn ? '1' : '.45';
    const svg = nav.querySelector('svg');
    const span = nav.querySelector('span');
    if(svg){
      svg.setAttribute('stroke', isOn ? '#6366f1' : '#c0c0c8');
      if(k === 'home') svg.setAttribute('fill', isOn ? '#6366f1' : 'none');
    }
    if(span){
      span.style.color = isOn ? '#6366f1' : '#c0c0c8';
      span.style.fontWeight = isOn ? '700' : '600';
    }
  });
}

let _ticketImages = JSON.parse(localStorage.getItem('expokr_ticket_images')||'{}');
function uploadTicketImage(expoId){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.capture='environment';
  inp.onchange=function(){
    const file=inp.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      const img=new Image();
      img.onload=function(){
        const MAX=600;let w=img.width,h=img.height;
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX}else{w=Math.round(w*MAX/h);h=MAX}}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        const qrImage=c.toDataURL('image/jpeg',0.85);
        _ticketImages[String(expoId)]=qrImage;
        localStorage.setItem('expokr_ticket_images',JSON.stringify(_ticketImages));
        showToast('입장권이 업로드되었습니다! 🎫');
        // Re-render detail if open
        if(window._detailEx && window._detailEx.id==expoId) showDetail(window._detailEx,_detailList,_detailIndex);
        updateQRPage();
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function cls(ex){ const s=new Date(ex.dateStart);s.setHours(0,0,0,0);const e=new Date(ex.dateEnd);e.setHours(23,59,59,999);return today>=s&&today<=e?"ongoing":today<s?"upcoming":"past";}
function dday(ex){ const s=new Date(ex.dateStart);s.setHours(0,0,0,0);const d=Math.round((s-today)/864e5);return d===0?{l:"D-DAY",t:"today"}:d>0?{l:"D-"+d,t:"upcoming"}:{l:"D+"+Math.abs(d),t:"past"};}
function stars(r,sz=8,onCard=false){const f=Math.floor(r);const fc=onCard?'#fff':'#f59e0b';const ec=onCard?'rgba(255,255,255,.3)':'#d1d5db';const sh=onCard?'text-shadow:0 1px 3px rgba(0,0,0,.3)':'';return Array.from({length:5},(_,i)=>`<span style="color:${i<f?fc:ec};font-size:${sz}px;${sh}">★</span>`).join('');}

function getRegAvail(ex){
  const now=new Date();now.setHours(0,0,0,0);
  const start=new Date(ex.dateStart);start.setHours(0,0,0,0);
  const end=new Date(ex.dateEnd);end.setHours(0,0,0,0);
  if(now>end)return{status:"종료",label:"종료",color:"#9ca3af",bg:"rgba(156,163,175,.12)",icon:"⚫",avail:false};
  if(ex.regDeadline){
    const dl=new Date(ex.regDeadline);dl.setHours(0,0,0,0);
    const d=Math.ceil((dl-now)/864e5);
    if(d<0)return{status:"마감",label:"신청마감",color:"#ef4444",bg:"rgba(239,68,68,.1)",icon:"🔴",avail:false};
    if(d===0)return{status:"오늘마감",label:"오늘 마감!",color:"#ef4444",bg:"rgba(239,68,68,.15)",icon:"🔥",avail:true,urgent:true,d:0};
    if(d<=3)return{status:"신청가능",label:"신청가능 D-"+d,color:"#f59e0b",bg:"rgba(245,158,11,.12)",icon:"⚠️",avail:true,urgent:true,d};
    if(d<=7)return{status:"신청가능",label:"신청가능 D-"+d,color:"#22c55e",bg:"rgba(34,197,94,.1)",icon:"🟢",avail:true,urgent:false,d};
    return{status:"신청가능",label:"신청가능 D-"+d,color:"#22c55e",bg:"rgba(34,197,94,.08)",icon:"🟢",avail:true,urgent:false,d};
  }
  if(ex.regUrl){
    const est=new Date(start.getTime()-864e5);const d=Math.ceil((est-now)/864e5);
    if(d<0)return{status:"마감추정",label:"마감추정",color:"#f59e0b",bg:"rgba(245,158,11,.1)",icon:"🟡",avail:false};
    return{status:"신청가능",label:"신청가능(추정) D-"+d,color:"#22c55e",bg:"rgba(34,197,94,.08)",icon:"🟢",avail:true,urgent:d<=3,d};
  }
  return{status:"확인중",label:"확인중",color:"#f59e0b",bg:"rgba(245,158,11,.08)",icon:"🟡",avail:false};
}

function render(exs){

  });
}
